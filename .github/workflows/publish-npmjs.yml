name: Publish Zoneflow Packages

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 배포할 npm dist-tag
        required: false
        default: latest
        type: string
      access:
        description: npm 접근 수준
        required: false
        default: public
        type: choice
        options:
          - restricted
          - public
      dry_run:
        description: 실제 배포 없이 검증만 실행
        required: false
        default: true
        type: boolean
      release_type:
        description: 자동 버전 증가 방식
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      release_version:
        description: 직접 지정할 배포 버전. 비우면 npm 기준으로 자동 증가
        required: false
        default: ""
        type: string
      prerelease_id:
        description: prerelease 선택 시 사용할 식별자
        required: false
        default: rc
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npmjs
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@zoneflow"

      - name: Ensure supported npm version
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release-version
        run: |
          version_args=(
            --write
            --source registry
            --bump "${{ inputs.release_type }}"
            --prerelease-id "${{ inputs.prerelease_id }}"
          )

          if [ -n "${{ inputs.release_version }}" ]; then
            version_args+=(--version "${{ inputs.release_version }}")
          fi

          next_version=$(node ./scripts/release-version.mjs "${version_args[@]}")
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${next_version}"

      - name: Build packages
        run: pnpm -r --filter "./packages/*" build

      - name: Type check
        run: pnpm -r --filter "./packages/*" type-check

      - name: Pack packages
        run: |
          rm -rf .npm-packages
          mkdir -p .npm-packages
          pnpm -r --filter "./packages/*" pack --pack-destination ./.npm-packages
          ls -1 .npm-packages

      - name: Publish packages
        run: |
          echo "Publishing version ${{ steps.release-version.outputs.next_version }}"
          shopt -s nullglob
          tarballs=(./.npm-packages/*.tgz)

          if [ ${#tarballs[@]} -eq 0 ]; then
            echo "No package tarballs were produced."
            exit 1
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            for tarball in "${tarballs[@]}"; do
              npm publish "$tarball" \
                --dry-run \
                --access "${{ inputs.access }}" \
                --tag "${{ inputs.dist_tag }}"
            done
          else
            for tarball in "${tarballs[@]}"; do
              npm publish "$tarball" \
                --access "${{ inputs.access }}" \
                --tag "${{ inputs.dist_tag }}"
            done
          fi
