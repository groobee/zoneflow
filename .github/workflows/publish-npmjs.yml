name: Publish Zoneflow Packages

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to publish with
        required: false
        default: latest
        type: string
      access:
        description: npm access level
        required: false
        default: restricted
        type: choice
        options:
          - restricted
          - public
      dry_run:
        description: Run publish in dry-run mode
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npmjs
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@zoneflow"

      - name: Ensure supported npm version
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r --filter "./packages/*" type-check

      - name: Build packages
        run: pnpm -r --filter "./packages/*" build

      - name: Pack packages
        run: |
          rm -rf .npm-packages
          mkdir -p .npm-packages
          pnpm -r --filter "./packages/*" pack --pack-destination ./.npm-packages
          ls -1 .npm-packages

      - name: Publish packages
        run: |
          shopt -s nullglob
          tarballs=(./.npm-packages/*.tgz)

          if [ ${#tarballs[@]} -eq 0 ]; then
            echo "No package tarballs were produced."
            exit 1
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            for tarball in "${tarballs[@]}"; do
              npm publish "$tarball" \
                --dry-run \
                --access "${{ inputs.access }}" \
                --tag "${{ inputs.dist_tag }}"
            done
          else
            for tarball in "${tarballs[@]}"; do
              npm publish "$tarball" \
                --access "${{ inputs.access }}" \
                --tag "${{ inputs.dist_tag }}"
            done
          fi
